# ─── Prompts ──────────────────────────────────────────────────────────────

# System prompt por defecto. Se puede sobreescribir con -s/--system en CLI
# o con /system dentro de la sesión.
system_prompt: "You are an assistant for answering questions and chatting with the user, your name is Crotolamo"

# ─── Generación ───────────────────────────────────────────────────────────

# Temperatura de muestreo (0.0 = determinístico, 1.0 = muy aleatorio).
temperature: 0.80

# Máximo de tokens generados por respuesta.
max_tokens: 2048

# Tamaño de la ventana de contexto (num_ctx de Ollama).
# null => respetar el PARAMETER num_ctx del Modelfile del modelo.
# Si se fija un entero, sobreescribe al Modelfile.
num_ctx: null

# Thinking mode:
#   false              → desactivado
#   true               → activado
#   low | medium | high → niveles (solo modelos que los soporten)
think: false

# ─── Almacenamiento ───────────────────────────────────────────────────────

# Ruta al archivo SQLite donde se guardan sesiones y mensajes.
# null => XDG default (~/.local/share/libre_chat/history.db)
db_path: /home/zxxz6/simple_chatbot/history.db
